# Nginx: драгсоюз.рф (punycode + кириллица) + dragsoyuz.ru
# Скопировать в /etc/nginx/sites-available/dragsoyuz
# ln -sf /etc/nginx/sites-available/dragsoyuz /etc/nginx/sites-enabled/dragsoyuz
#
# SSL для www: certbot certonly --nginx -d драгсоюз.рф -d www.драгсоюз.рф
# (или punycode-варианты домена)

# --- www → без www (драгсоюз.рф) ---
server {
    listen 80;
    listen [::]:80;
    server_name www.xn--80agbo8ajj9h.xn--p1ai www.драгсоюз.рф;
    return 301 https://драгсоюз.рф$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.xn--80agbo8ajj9h.xn--p1ai www.драгсоюз.рф;

    ssl_certificate /etc/letsencrypt/live/xn--80agbo8ajj9h.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--80agbo8ajj9h.xn--p1ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://драгсоюз.рф$request_uri;
}

# --- Основной домен драгсоюз.рф ---
server {
    listen 80;
    listen [::]:80;
    server_name xn--80agbo8ajj9h.xn--p1ai драгсоюз.рф;
    return 301 https://драгсоюз.рф$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xn--80agbo8ajj9h.xn--p1ai драгсоюз.рф;

    ssl_certificate /etc/letsencrypt/live/xn--80agbo8ajj9h.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--80agbo8ajj9h.xn--p1ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # 301: URL с двойными слешами → нормализованный путь
    if ($request_uri ~ "^[^?]*//") {
        return 301 $scheme://$host$uri$is_args$args;
    }

    location / {
        proxy_pass http://127.0.0.1:3050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}

